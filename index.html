// ---- Seeded Random ----
class SRng {
  constructor(seed) { this.s = seed || Date.now(); }
  next() { this.s = (this.s * 1664525 + 1013904223) & 0xFFFFFFFF; return (this.s >>> 0) / 0xFFFFFFFF; }
  int(min, max) { return Math.floor(this.next() * (max - min + 1)) + min; }
  pick(arr) { return arr[this.int(0, arr.length - 1)]; }
  shuffle(a) { let b=[...a]; for(let i=b.length-1;i>0;i--){let j=this.int(0,i);[b[i],b[j]]=[b[j],b[i]]} return b; }
}

// ---- Web Audio (simple) ----
let audioCtx;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function beep(freq,dur,type='square',vol=0.08){
  try{initAudio();const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type;o.frequency.value=freq;g.gain.value=vol;
  o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur)}catch(e){}
}
function sndType(){beep(800,0.02)}
function sndSuccess(){beep(523,0.1,'sine',0.1);setTimeout(()=>beep(659,0.1,'sine',0.1),100);setTimeout(()=>beep(784,0.15,'sine',0.1),200)}

// ---- Game Data ----

const HOSTNAMES_DMZ = ['web-ext-01','mail-gw-01','vpn-edge-01','proxy-dmz-01','waf-01','cdn-cache-01'];
const HOSTNAMES_CORP = ['ws-fin-PC042','ws-hr-PC018','fileserv-01','print-srv-01','ws-dev-PC107','ws-mktg-PC033'];
const HOSTNAMES_SRV = ['app-srv-01','db-prod-01','ci-jenkins-01','wiki-internal','erp-srv-01','backup-srv-01'];

const LOOT_TABLE = [
  {id:'0day',name:'0-Day Exploit',desc:'Guaranteed success on next exploit attempt. Single use.',type:'tool',rarity:0.05},
  {id:'mimikatz',name:'Mimikatz',desc:'+3 bonus to credential harvesting & privesc.',type:'tool',rarity:0.12},

  {id:'vpncreds',name:'VPN Credentials',desc:'Skip one zone when pivoting.',type:'tool',rarity:0.08},
  {id:'sshkeys',name:'SSH Private Keys',desc:'+2 bonus to lateral movement.',type:'tool',rarity:0.15},
  {id:'encfiles',name:'Encrypted Files',desc:'Worth bonus points if exfiltrated.',type:'data',rarity:0.18},
  {id:'pwdump',name:'Password Dump',desc:'Reveals access codes for adjacent zones (-3 DC on exploit).',type:'intel',rarity:0.15},
  {id:'netdiagram',name:'Network Diagram',desc:'Reveals all rooms in current zone.',type:'intel',rarity:0.12},
  {id:'srccode',name:'Source Code Repository',desc:'Reveals vulnerabilities in server farm.',type:'intel',rarity:0.10},
  {id:'emailarchive',name:'Email Archive',desc:'Contains sensitive exec communications. Worth big exfil points.',type:'data',rarity:0.10},
  {id:'apikeys',name:'Cloud API Keys',desc:'Worth bonus points. +1 to exploit.',type:'data',rarity:0.12},
];

const BLUE_EVENTS = [
  {msg:'[!] Blue Team runs a network sweep — detection risk +5%',detect:5,threshold:0},
  {msg:'[!] New IDS signatures deployed — future scans are riskier.',detect:3,threshold:20,effect:'ids_upgrade'},
  {msg:'[!] SOC analyst notices anomalous traffic — detection risk +8%',detect:8,threshold:30},
  {msg:'[!] Forced password rotation initiated — existing creds may expire.',detect:0,threshold:40,effect:'pwd_rotate'},
  {msg:'[!] Threat hunter deployed to your zone — detection risk +10%',detect:10,threshold:50},
  {msg:'[!] EDR signatures updated — evasion is harder.',detect:5,threshold:55,effect:'edr_upgrade'},
  {msg:'[!] Incident Response team activated — DFIR analysis in progress!',detect:8,threshold:70},
  {msg:'[!] Network segmentation rules tightened — pivoting DC increased.',detect:3,threshold:60,effect:'seg_tighten'},
];

// ---- Game State ----
let G = null; // game state
let rng;
let typeQueue = [];
let typing = false;
let inputMode = 'title'; // title, callsign, spec, game, gameover
let commandHistory = [];
let historyIdx = -1;

function newGame(seed) {
  seed = seed || (Date.now() % 1000000);
  rng = new SRng(seed);
  G = {
    seed, callsign:'', spec:null, specName:'',
    stealth:10, accessLevel:0, detection:0, score:0, turn:0,
    tools:['nmap','netcat','burpsuite'], intel:[], loot:[], exfilData:[],
    zones:[], currentZone:0, currentRoom:0,
    discoveredZones:new Set([0]), discoveredRooms:{},
    roomAccess:{}, roomPersistence:{}, roomScanned:{},
    blueAlertLevel:0, eventsTriggered:new Set(),
    idsUpgrade:false, edrUpgrade:false, segTighten:false, pwdRotated:false,
    usedZeroDay:false, gameOver:false, victory:false,
    log:[]
  };
  generateWorld();
  return G;
}

function generateWorld() {
  G.zones = ZONE_DEFS.map((zd, zi) => {
    const numRooms = rng.int(zd.minRooms, zd.maxRooms);
    const hostPool = rng.shuffle(HOSTNAME_POOLS[zi]);
    const rooms = [];
    for (let i = 0; i < numRooms; i++) {
      const numServices = rng.int(1, 3);
      const svcs = rng.shuffle(SERVICES).slice(0, numServices).map(s => ({...s, dc: s.dc + zi * 2}));
      const loot = [];
      for (const item of LOOT_TABLE) {
        if (rng.next() < item.rarity * (1 + zi * 0.3)) loot.push({...item});
      }
      rooms.push({
        hostname: hostPool[i] || `host-${zi}-${i}`,
        services: svcs,
        loot,
        lootFound: false,
        scanned: false,
        accessed: false,
        accessLevel: 0,
        persistence: false,
        dataValue: (zi + 1) * rng.int(10, 30),
        users: rng.int(1, 10 + zi * 5),
        os: rng.pick(['Windows Server 2019','Windows 11','Ubuntu 22.04','CentOS 8','Windows Server 2022','Debian 12']),
      });
    }
    return { ...zd, rooms, discovered: zi === 0 };
  });
  G.discoveredRooms[0] = new Set([0]);
}

// ---- Output ----
function print(text, cls='') {
  const div = document.createElement('div');
  if (cls) div.className = cls;
  div.textContent = text;
  terminal.appendChild(div);
  terminal.scrollTop = terminal.scrollHeight;
}

function printHTML(html) {
  const div = document.createElement('div');
  div.innerHTML = html;
  terminal.appendChild(div);
  terminal.scrollTop = terminal.scrollHeight;
}

function typeText(text, cls='', speed=8) {
  return new Promise(resolve => {
    const div = document.createElement('div');
    if (cls) div.className = cls;
    terminal.appendChild(div);
    let i = 0;
    const interval = setInterval(() => {
      if (i < text.length) {
        div.textContent += text[i];
        i++;
        terminal.scrollTop = terminal.scrollHeight;
      } else {
        clearInterval(interval);
        resolve();
      }
    }, speed);
  });
}

async function typeLines(lines, cls='', speed=5) {
  for (const line of lines) {
    await typeText(line, cls, speed);
  }
}

function printSep() { print('─'.repeat(70), 'text-dim'); }

// ---- UI Update ----
function updateUI() {
  if (!G) return;
  $('s-callsign').textContent = G.callsign || '---';
  $('s-spec').textContent = G.specName || '---';
  $('s-access').textContent = ['None','User','Local Admin','Domain Admin'][G.accessLevel];
  $('s-stealth').textContent = G.stealth;
  $('s-detect').textContent = Math.min(100, G.detection) + '%';
  $('s-score').textContent = G.score;
  $('s-zone').textContent = G.zones.length ? G.zones[G.currentZone].name : '---';
  $('s-turn').textContent = G.turn;

  const db = $('detection-bar');
  const d = Math.min(100, G.detection);
  db.style.width = d + '%';
  db.style.background = d < 25 ? 'var(--green)' : d < 50 ? 'var(--yellow)' : d < 75 ? '#ff8800' : 'var(--red)';

  updateMap();
  updateSideInfo();
}

function updateMap() {
  if (!G || !G.zones.length) { $('mini-map').textContent = ''; return; }
  let map = '';
  const arrows = ['  │','  │','  │','  │'];
  for (let i = 0; i < G.zones.length; i++) {
    const z = G.zones[i];
    const isCurrent = i === G.currentZone;
    const discovered = G.discoveredZones.has(i);
    const marker = isCurrent ? ' ◄◄ YOU' : '';
    if (discovered) {
      map += (isCurrent ? '► ' : '  ') + `[${z.name}]${marker}\n`;
      const rooms = G.discoveredRooms[i] || new Set();
      for (let r = 0; r < z.rooms.length; r++) {
        if (rooms.has(r)) {
          const rm = z.rooms[r];
          const cur = isCurrent && r === G.currentRoom;
          const acc = rm.accessLevel > 0 ? '✓' : ' ';
          map += `    ${cur?'→':'·'} ${rm.hostname} [${acc}]\n`;
        }
      }
    } else {
      map += `  [???]\n`;
    }
    if (i < G.zones.length - 1) map += '    |\n';
  }
  $('mini-map').textContent = map;
}

function updateSideInfo() {
  if (!G || !G.zones.length) { $('side-info').textContent = ''; return; }
  const room = G.zones[G.currentZone].rooms[G.currentRoom];
  let info = `Host: ${room.hostname}\n`;
  info += `OS: ${room.os}\n`;
  info += `Users: ~${room.users}\n`;
  info += `Access: ${['None','User','Admin','DomAdmin'][room.accessLevel]}\n`;
  if (room.scanned) {
    info += `\nServices:\n`;
    for (const s of room.services) {
      info += ` :${s.port} ${s.name}\n`;
    }
  } else {
    info += `\nServices: [not scanned]\n`;
  }
  if (room.persistence) info += `\n[Backdoor installed]\n`;
  info += `\nData value: ${room.scanned ? room.dataValue + ' pts' : '???'}\n`;
  $('side-info').textContent = info;
}

// ---- Dice ----
function roll20() { return rng.int(1, 20); }
function getBonus(action) {
  let b = 0;
  if (G.spec && SPECS[G.spec].bonus[action]) b += SPECS[G.spec].bonus[action];
  if (action === 'privesc' && G.loot.find(l=>l.id==='mimikatz')) b += 3;
  if (action === 'pivot' && G.loot.find(l=>l.id==='cobaltstrike')) b += 2;
  if (action === 'pivot' && G.loot.find(l=>l.id==='sshkeys')) b += 2;
  if (action === 'persist' && G.loot.find(l=>l.id==='cobaltstrike')) b += 2;
  if (action === 'exploit' && G.loot.find(l=>l.id==='apikeys')) b += 1;
  if (G.pwdRotated && (action === 'pivot' || action === 'exploit')) b -= 2;
  return b;
}

function skillCheck(action, dc) {
  const r = roll20();
  const bonus = getBonus(action);
  const total = r + bonus;
  const success = total >= dc;
  const crit = r === 20;
  const critFail = r === 1;
  sndRoll();
  return { r, bonus, total, dc, success: crit || (success && !critFail), crit, critFail };
}

function rollResultText(check, actionName) {
  let s = `  [ROLL] d20 = ${check.r}`;
  if (check.bonus !== 0) s += ` + ${check.bonus} modifier`;
  s += ` = ${check.total} vs DC ${check.dc}`;
  if (check.crit) s += ' ★ CRITICAL SUCCESS!';
  else if (check.critFail) s += ' ✗ CRITICAL FAILURE!';
  else if (check.success) s += ' ✓ Success';
  else s += ' ✗ Failed';
  return s;
}

// ---- Detection & Blue Team ----
function addDetection(amount) {
  if (G.idsUpgrade) amount = Math.ceil(amount * 1.3);
  G.detection = Math.min(100, G.detection + amount);
  if (amount > 0) sndAlert();
  if (G.detection >= 100) {
    gameOver(false);
    return true;
  }
  checkBlueEvents();
  return false;
}

function reduceDetection(amount) {
  G.detection = Math.max(0, G.detection - amount);
}

function checkBlueEvents() {
  for (const evt of BLUE_EVENTS) {
    if (G.detection >= evt.threshold && !G.eventsTriggered.has(evt.msg)) {
      if (rng.next() < 0.6) {
        G.eventsTriggered.add(evt.msg);
        print('');
        print(evt.msg, 'text-red');
        if (evt.detect > 0) G.detection = Math.min(100, G.detection + evt.detect);
        if (evt.effect === 'ids_upgrade') G.idsUpgrade = true;
        if (evt.effect === 'edr_upgrade') G.edrUpgrade = true;
        if (evt.effect === 'seg_tighten') G.segTighten = true;
        if (evt.effect === 'pwd_rotate') G.pwdRotated = true;
        if (G.detection >= 100) gameOver(false);
      }
    }
  }
}

function blueTeamTurn() {
  // Random blue team action each turn
  if (G.detection >= 50 && rng.next() < 0.25) {
    const sweep = rng.int(3, 8);
    print(`\n[!] Blue Team sweep detected in your zone — +${sweep}% detection risk`, 'text-red');
    addDetection(sweep);
  }
  if (G.detection >= 75 && rng.next() < 0.15) {

function doPivot(direction) {
  G.turn++;
  const zone = G.zones[G.currentZone];

  // Check if moving to a different room in same zone or to new zone
  if (direction === 'next' || direction === 'n') {
    // Move to next room in zone
    const nextRoom = G.currentRoom + 1;
    if (nextRoom >= zone.rooms.length) {
      print('\n[!] No more rooms in this zone. Use PIVOT FORWARD to move to next zone.', 'text-yellow');
      return;
    }
    print(`\n┌─ T1021 | Lateral Movement (Same Zone) ─────────────`);
    const dc = 8 + G.currentZone;
    const check = skillCheck('pivot', dc);
    print('│ ' + rollResultText(check));
    if (check.success) {
      G.currentRoom = nextRoom;
      if (!G.discoveredRooms[G.currentZone]) G.discoveredRooms[G.currentZone] = new Set();
      G.discoveredRooms[G.currentZone].add(nextRoom);
      print(`│ [+] Moved to ${zone.rooms[nextRoom].hostname}`);
      const det = rng.int(1, 4);
      print(`│ [!] Detection risk +${det}%`);
      print('└────────────────────────────────────────────────────');
      addDetection(det);
      describeRoom();
      sndSuccess();
    } else {
      print('│ [-] Lateral movement failed.');
      const det = rng.int(3, 7);
      print(`│ [!] Detection risk +${det}%`);
      print('└────────────────────────────────────────────────────');
      addDetection(det);
      sndFail();
    }
  } else if (direction === 'prev' || direction === 'p' || direction === 'back') {
    const prevRoom = G.currentRoom - 1;
    if (prevRoom < 0) {
      if (G.currentZone > 0) {
        // Go back a zone
        G.currentZone--;
        G.currentRoom = 0;
        print(`\n[*] Fell back to ${G.zones[G.currentZone].name}`);
        describeRoom();
      } else {
        print('\n[!] You\'re at the entry point. Nowhere to fall back to.', 'text-yellow');
      }
      updateUI();
      return;
    }
    G.currentRoom = prevRoom;
    print(`\n[*] Moved back to ${zone.rooms[prevRoom].hostname}`);
    describeRoom();
  } else {
    // Forward = next zone
    const nextZone = G.currentZone + 1;
    if (nextZone >= G.zones.length) {
      print('\n[!] You\'re in the deepest zone.', 'text-yellow');
      return;
    }

    const reqAccess = Math.min(2, Math.floor(nextZone / 2) + 1);
    const room = zone.rooms[G.currentRoom];
    if (room.accessLevel < reqAccess) {
      print(`\n[!] Need at least ${['None','User','Local Admin'][reqAccess]} access to pivot to ${G.zones[nextZone].name}.`, 'text-yellow');
      return;
    }

    print(`\n┌─ T1021 | Lateral Movement (Zone Pivot) ────────────`);
    print(`│ Pivoting: ${zone.name} → ${G.zones[nextZone].name}`);

    let dc = 10 + nextZone * 3;
    if (G.segTighten) { dc += 3; print('│ [*] Network segmentation tightened (+3 DC)'); }

      print('│ [*] Using VPN credentials — bypassing controls');
      dc -= 5;
    }

    const check = skillCheck('pivot', dc);
    print('│ ' + rollResultText(check));

    if (check.success) {
      G.currentZone = nextZone;
      G.currentRoom = 0;
      G.discoveredZones.add(nextZone);

      G.discoveredRooms[nextZone].add(0);

  if (room.lootFound) return;

  print('');
  for (const item of room.loot) {
    print(`  [LOOT] Found: ${item.name}`, 'text-yellow');
    print(`         ${item.desc}`, 'text-dim');
    if (item.type === 'intel') {
      G.intel.push(item.name);
      if (item.id === 'netdiagram') {
        const zi = G.currentZone;
        if (!G.discoveredRooms[zi]) G.discoveredRooms[zi] = new Set();
        for (let r = 0; r < G.zones[zi].rooms.length; r++) G.discoveredRooms[zi].add(r);
        print('         → All rooms in this zone revealed!');
      }
      if (item.id === 'srccode') {
        const srvZone = 2;
        if (!G.discoveredRooms[srvZone]) G.discoveredRooms[srvZone] = new Set();
        for (let r = 0; r < G.zones[srvZone].rooms.length; r++) {
          G.zones[srvZone].rooms[r].scanned = true;
          G.discoveredRooms[srvZone].add(r);
        }
        G.discoveredZones.add(srvZone);
        print('         → Server Farm vulnerabilities revealed!');
      }
    } else {
      G.loot.push(item);
    }
    G.score += 10;
  }

    print(`  Services: ${room.services.map(s => s.port + '/' + s.name.split(' ')[0]).join(', ')}`);

    print(`  Access: ${['','User','Local Admin','Domain Admin'][room.accessLevel]}`);
  }
  printSep();
}

// ---- Command Processing ----
function processCommand(raw) {
  const input = raw.trim();
  if (!input) return;

  print(`\n$> ${input}`, 'text-dim');

  if (inputMode === 'title') {
    const parts = input.toLowerCase().split(/\s+/);
    if (parts[0] === 'new') {
      const seed = parts[1] ? parseInt(parts[1]) : undefined;
      newGame(seed);
      print(`\n[*] Operation initialized. Seed: ${G.seed}`);
      print('[*] Enter your operator callsign:');
      inputMode = 'callsign';
      $('prompt').textContent = 'Callsign>';
    } else if (parts[0] === 'load') {
      loadGame();
    } else {
      print('[!] Type NEW or LOAD.', 'text-yellow');
    }
    return;
  }

  if (inputMode === 'callsign') {
    G.callsign = input.substring(0, 20);
    print(`\n[*] Callsign set: ${G.callsign}`);
    print('\n[*] Choose your specialization:');
    print('  1. NETWORK  — Bonus to scanning & lateral movement');
    print('  2. EXPLOIT  — Bonus to exploitation & privilege escalation');
    print('  3. SOCIAL   — Bonus to phishing & social attacks');
    print('  4. MALWARE  — Bonus to persistence & defense evasion');
    print('\nEnter 1-4 or name:');
    inputMode = 'spec';
    $('prompt').textContent = 'Spec>';
    updateUI();
    return;
  }

  if (inputMode === 'spec') {
    const specMap = {'1':'network','2':'exploit','3':'social','4':'malware','network':'network','exploit':'exploit','social':'social','malware':'malware','net':'network','exp':'exploit','soc':'social','mal':'malware'};
    const choice = specMap[input.toLowerCase()];
    if (!choice) { print('[!] Invalid choice. Enter 1-4.', 'text-yellow'); return; }
    G.spec = choice;
    G.specName = SPECS[choice].name;
    print(`\n[*] Specialization: ${SPECS[choice].name}`);
    print(`[*] ${SPECS[choice].desc}`);
    print('');
    printSep();
    print('  OPERATION BRIEFING');
    printSep();
    print('  Target: NexaCorp (Fortune 500, tech sector)');
    print('  Objective: Achieve Domain Admin access');
    print('  Objective: Exfiltrate crown jewels from Data Center');
    print('  Rules of Engagement: Avoid detection at all costs');
    print('  Starting point: DMZ perimeter');
    printSep();
    print('');
    print('  Type HELP for available commands.');
    print('');
    inputMode = 'game';
    $('prompt').textContent = `${G.callsign}@nexacorp$`;
    printZoneArt(0);
    describeRoom();
    updateUI();
    return;
  }

  if (inputMode === 'gameover') {
    const parts = input.toLowerCase().split(/\s+/);
    if (parts[0] === 'new') {
      terminal.innerHTML = '';
      const seed = parts[1] ? parseInt(parts[1]) : undefined;
      newGame(seed);
      print(`[*] Operation initialized. Seed: ${G.seed}`);
      print('[*] Enter your operator callsign:');
      inputMode = 'callsign';
      $('prompt').textContent = 'Callsign>';
    } else {
      print('[!] Type NEW to start again.', 'text-yellow');
    }
    return;
  }

  // Game mode
  if (G.gameOver) return;

  const parts = input.toLowerCase().split(/\s+/);
  const cmd = parts[0];

  switch(cmd) {
    case 'scan': case 's': doScan(); break;
    case 'exploit': case 'e': doExploit(parts[1] !== undefined ? parseInt(parts[1]) : undefined); break;
    case 'phish': case 'ph': doPhish(); break;
    case 'privesc': case 'pe': doPrivesc(); break;
    case 'pivot': case 'pv':
      const dir = parts[1] || 'forward';
      doPivot(dir);
      break;
    case 'exfil': case 'x': doExfil(); break;
    case 'persist': case 'ps': doPersist(); break;
    case 'evade': case 'ev': doEvade(); break;
    case 'hide': case 'h': doHide(); break;
    case 'inventory': case 'i': case 'inv': doInventory(); break;
    case 'map': case 'm': doMap(); break;
    case 'look': case 'l': describeRoom(); break;
    case 'help': case '?': showHelp(); break;
    case 'save': saveGame(); break;
    case 'load': loadGame(); break;
    case 'clear': terminal.innerHTML = ''; break;
    default:
      print(`[!] Unknown command: ${cmd}. Type HELP for commands.`, 'text-yellow');
  }
}

// ---- Save/Load ----
function saveGame() {
  if (!G) { print('[!] No game to save.', 'text-yellow'); return; }
  const save = JSON.parse(JSON.stringify(G));
  save.discoveredZones = [...G.discoveredZones];
  save.discoveredRooms = {};
  for (const k in G.discoveredRooms) save.discoveredRooms[k] = [...G.discoveredRooms[k]];
  save.eventsTriggered = [...G.eventsTriggered];
  localStorage.setItem('breach_save', JSON.stringify(save));
  print('[+] Game saved to localStorage.', 'text-bright');
}

function loadGame() {
  const raw = localStorage.getItem('breach_save');
  if (!raw) { print('[!] No saved game found.', 'text-yellow'); return; }
  try {
    G = JSON.parse(raw);
    G.discoveredZones = new Set(G.discoveredZones);
    const dr = {};
    for (const k in G.discoveredRooms) dr[k] = new Set(G.discoveredRooms[k]);
    G.discoveredRooms = dr;
    G.eventsTriggered = new Set(G.eventsTriggered);
    rng = new SRng(G.seed + G.turn * 7919);
    inputMode = 'game';
    $('prompt').textContent = `${G.callsign}@nexacorp$`;
    print('[+] Game loaded successfully.', 'text-bright');
    print(`[*] Operator: ${G.callsign} | ${G.specName} | Turn ${G.turn}`);
    describeRoom();
    updateUI();
  } catch(e) {
    print('[!] Failed to load save: ' + e.message, 'text-red');
  }
}

// ---- Input Handling ----
cmdInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const val = cmdInput.value;
    commandHistory.unshift(val);
    if (commandHistory.length > 50) commandHistory.pop();
    historyIdx = -1;
    cmdInput.value = '';
    processCommand(val);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (historyIdx < commandHistory.length - 1) {
      historyIdx++;
      cmdInput.value = commandHistory[historyIdx];
    }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (historyIdx > 0) {
      historyIdx--;
      cmdInput.value = commandHistory[historyIdx];
    } else {
      historyIdx = -1;
      cmdInput.value = '';
    }
  } else {
    sndType();
  }
});

// Focus input on click anywhere
document.addEventListener('click', () => cmdInput.focus());

// ---- Init ----
showTitle();
cmdInput.focus();
